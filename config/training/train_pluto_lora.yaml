# @package _global_
# PLUTO LoRA Fine-tuning Configuration
# 
# This config supports:
# - Uniform fine-tuning (all difficulty levels mixed)
# - Curriculum fine-tuning (3-stage progressive training)
# - Encoder-only LoRA + ultra-minimal head fine-tuning

hydra:
  searchpath:
    - pkg://nuplan.planning.script.config.common
    - pkg://nuplan.planning.script.config.training
    - file://${oc.env:PLUTO_CONFIG_ROOT,./config}

defaults:
  - /training_protocol: flat_area_matched_v1
  - /data_augmentation: contrastive_scenario_generator
  - /splitter: nuplan
  - /model: pluto_model
  - /scenario_filter: uniform_train_all  # Default, will be overridden by command line
  - /scenario_builder: nuplan_mini
  - /data_loader: default_data_loader
  - /scenario_type_weights: default_scenario_type_weights
  - /custom_trainer: pluto_lora_trainer
  - /lightning: custom_lightning
  - /worker: sequential
  - _self_

job_name: pluto_lora_finetune
py_func: train
objective_aggregate_mode: mean
experiment: lora_finetune

# Random seed
seed: 42

# Experiment grouping
group: outputs

# Experiment structure
date_format: '%Y.%m.%d.%H.%M.%S'
experiment_uid: ${now:${date_format}}
experiment_name: training

# Training mode: "uniform" or "curriculum"
train_mode: uniform

# LoRA configuration
lora:
  enabled: ${training_protocol.lora.enabled}
  # Persist the orchestration contract in Hydra output. The canonical Uniform
  # runner overrides this so old staged Uniform checkpoints are not reused as
  # continuous baselines.
  execution_mode: staged_curriculum
  rank: ${training_protocol.lora.rank}
  alpha: ${training_protocol.lora.alpha}
  dropout: ${training_protocol.lora.dropout}
  lora_lr: ${training_protocol.schedule.lora_lr}
  head_lr: ${training_protocol.schedule.head_lr}
  policy_head_lr: ${training_protocol.schedule.head_lr}  # Alias for head_lr
  ultra_minimal: ${training_protocol.lora.ultra_minimal}
  trainable_modules: []
  # Clear Adam moments at a selected resume boundary while preserving the
  # scheduler and Lightning loop progress. Percentile-EHU enables this only
  # for the Phase A -> B transition.
  reset_optimizer_moments_on_resume: false
  # Final cumulative epoch boundary for a scheduler shared across resumed
  # processes. Null preserves the ordinary single-process behavior.
  scheduler_horizon_epochs: ${training_protocol.schedule.horizon_epochs}
  scheduler_type: ${training_protocol.schedule.type}
  training_protocol_id: ${training_protocol.protocol_id}
  training_protocol_sha256: ""
  curriculum_method_id: ""
  curriculum_method_sha256: ""
  require_protocol_match_on_resume: false
  save_merged: true
  use_collision_loss: true
  use_contrast_loss: false
  regulate_yaw: false

# Training hyperparameters
lr: ${training_protocol.training.base_lr}
weight_decay: ${training_protocol.optimizer.weight_decay}
epochs: ${training_protocol.phases.cumulative_epochs.c}
warmup_epochs: 0
warmup_steps: ${training_protocol.schedule.warmup_steps}

# Training stability
gradient_clip_val: ${training_protocol.training.gradient_clip_val}
skip_nan_steps: ${training_protocol.training.skip_nan_steps}
remove_invalid_goals: ${training_protocol.training.remove_invalid_goals}

# Loss weights configuration
# These weights control the relative importance of different loss components
model:
  loss:
    weight_reg_loss: 1.0          # Regression loss for ego trajectory
    weight_cls_loss: 1.0           # Classification loss for mode selection
    weight_prediction_loss: 1.0    # Prediction loss for other agents
    weight_collision_loss: 1.0     # Collision loss
    weight_contrastive_loss: 1.0   # Contrastive loss (if enabled)
    weight_ref_free_reg_loss: 1.0  # Reference-free trajectory regression loss
    weight_auxiliary: 1.0          # Global multiplier for auxiliary losses (prediction, collision, contrastive)
                                   # This is a convenient way to scale all auxiliary losses together

# Curriculum fine-tuning configuration
curriculum:
  # SSG/judge v4 demonstration types are observe-only until a human precision
  # audit enables routing. The sampler rejects enabled routing for non-LLM-v4 methods.
  method: score_bucket_curriculum_v1
  demonstration_type_mode: observe_only
  demonstration_type_metadata_path: null
  demonstration_type_policy:
    stage_role: all_consolidation
    stage_presets:
      easy_oriented:
        necessary_exception_multiplier: 1.0
        necessary_exception_absolute_cap: 0.05
        expert_error_multiplier: 0.1
        expert_error_absolute_cap: 0.005
        uncertain_multiplier: 0.5
        uncertain_absolute_cap: 0.05
      hard_oriented:
        necessary_exception_multiplier: 2.0
        necessary_exception_absolute_cap: 0.10
        expert_error_multiplier: 0.1
        expert_error_absolute_cap: 0.005
        uncertain_multiplier: 0.5
        uncertain_absolute_cap: 0.05
      all_consolidation:
        necessary_exception_multiplier: 1.25
        necessary_exception_absolute_cap: 0.075
        expert_error_multiplier: 0.25
        expert_error_absolute_cap: 0.01
        uncertain_multiplier: 0.5
        uncertain_absolute_cap: 0.05
  # Runtime schema defaults. The selected method-arm config and canonical
  # runner provide experiment-specific values explicitly.
  score_method: llm
  bucket_split_rule: quantile_33_33_33
  bucketization_mode: percentile_tercile
  percentile_split_seed: 42
  tie_break_mode: stable_hash
  sampler_mode: exact_bucket_quota
  phase_name: ""
  pacing_schedule: null
  replacement: true
  max_repeat_per_scenario: 4
  # Disabled in the generic config. The LLM-v4 runner enables these only for
  # its own experiment after a pool-capacity preflight.
  max_repeat_per_near_duplicate_group: 0
  near_duplicate_group_weighting: false
  cumulative_exposure_state_path: null
  max_cumulative_exposure_per_scenario: 0
  max_cumulative_exposure_per_near_duplicate_group: 0
  hard_subtype_balance: false
  hard_subtype_cap: 0.60
  random_seed: ${seed}
  sampling_log_path: null
  filter_file_path: null

# Pretrained checkpoint
pretrained_ckpt: checkpoints/pluto_1M_aux_cil.ckpt

# Output directory
output_dir: ${group}/${experiment}
metric_dir: metrics
aggregator_metric_dir: aggregator_metric
runner_report_file: runner_report.parquet

# Checkpoint path
checkpoint: null

# Logging
logger_level: info
logger_format_string: null
log_config: false

# Execution
max_number_of_workers: null
enable_profiling: false
gpu: true
verbose: false

# Distribution
distribute_by_scenario: true
distributed_timeout_seconds: 7200

# Cache settings
cache:
  cache_path: null
  force_feature_computation: false
  use_cache_without_dataset: false
  cleanup_cache: false

# WandB settings
wandb:
  mode: disabled
  project: nuplan-pluto-lora
  name: ${experiment}
  log_model: all
  artifact: null
  run_id: null
