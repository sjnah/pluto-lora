# Percentile-tercile curriculum experiment manifest.
# This file documents runnable experiment settings; it is not a Hydra primary
# config by itself.

version: v4.3.13
master_filter: uniform_train_all
bucketization_mode: percentile_tercile
percentile_split_seed: 42
tie_break_mode: stable_hash
sampler_mode: exact_bucket_quota
max_repeat_per_scenario: 4

design_note: >
  percentile_ehu uses easy warm-up -> mild hard focus -> uniform consolidation.
  This is not a direct Rampp reproduction; it combines easy-to-hard curriculum,
  mild hard-example emphasis, and final uniform consolidation.

shared_training_controls:
  lora_rank: 4
  lora_alpha: 8.0
  lora_dropout: 0.05
  lora_lr: 5e-5
  lr: 1e-5
  weight_decay: 0.05
  batch_size: 4
  accumulate_grad_batches: 8
  warmup_steps: 100
  gradient_clip_val: 0.5
  skip_nan_steps: true
  remove_invalid_goals: false
  total_cumulative_epochs: 12

phases:
  - name: easy_warmup
    target_proportions: [0.50, 0.40, 0.10]
    intended_update_fraction: 0.20
    cumulative_epochs_default: 2
  - name: mild_hard_focus
    target_proportions: [0.267, 0.333, 0.400]
    intended_update_fraction: 0.40
    cumulative_epochs_default: 7
  - name: uniform_consolidation
    target_proportions: [0.333333, 0.333333, 0.333334]
    intended_update_fraction: 0.40
    cumulative_epochs_default: 12

experiments:
  uniform_only:
    script: scripts/training/run_lora_experiment_uniform.sh
    filter: uniform_train_all
  llm_percentile_ehu:
    script: scripts/training/run_lora_experiment_llmbased.sh
    env:
      CURRICULUM_MODE: percentile_ehu
      METHOD: llm
  random_percentile_ehu:
    script: scripts/training/run_lora_experiment_randombucket.sh
    env:
      CURRICULUM_MODE: percentile_ehu
      METHOD: random
  rule_percentile_ehu:
    script: scripts/training/run_lora_experiment_rulebased.sh
    env:
      CURRICULUM_MODE: percentile_ehu
      METHOD: rule
  loss_percentile_ehu:
    script: scripts/training/run_lora_experiment_lossrank.sh
    env:
      CURRICULUM_MODE: percentile_ehu
      METHOD: loss
  mpoc_percentile_ehu:
    script: scripts/training/run_lora_experiment_mpoc.sh
    env:
      CURRICULUM_MODE: percentile_ehu
      METHOD: mpoc
  llm_legacy_raw:
    script: scripts/training/run_lora_experiment_llmbased.sh
    env:
      CURRICULUM_MODE: legacy_raw
    bucketization_mode: raw_macro
    sampler_mode: legacy_weighted
    stage2_target_proportions: [0.50, 0.40, 0.10]
    stage3_target_proportions: [0.30, 0.50, 0.20]
