suite_id: flat_lr_comparison_v1
training_protocol: config/training_protocol/flat_area_matched_v1.yaml

methods:
  llm:
    enabled: true
    artifact_version: v5.0.4.0.18
  random:
    enabled: false
    artifact_version: v1.18
  uniform:
    enabled: true
    artifact_version: v1.18
  rule:
    enabled: false
    artifact_version: v3.18
  loss:
    enabled: false
    artifact_version: v1.18
  mpoc:
    enabled: true
    artifact_version: v1.18

seeds:
  start: 1
  end: 3

evaluation:
  val14: false
  val14_fast: false
  test14_hard: false
  test14_hard_fast: true
  interplan10: true
  interplan_benchmark: false

runtime:
  # Shared by every stage, epoch, method, and seed in this suite. Bump the
  # suffix whenever the PLUTO feature-builder/serialization contract changes.
  feature_cache_name: flat_lr_comparison_v1_pluto_feature_v1
  type_routing_mode: "on"
  continue_on_failure: false
  disable_simulation_log: true
  skip_training_if_checkpoint_exists: true
