method: llm
label: LLM-guided
mode: bucketed
filter_prefix: llm_percentile_ehu
score_method: llm
curriculum_method: llm_guided_v4
sampler_mode: exact_bucket_quota
max_repeat_per_scenario: 4
hard_subtype_balance: false
tie_break_mode: stable_hash
bucketization_mode: percentile_tercile
phase_names:
  a: easy_warmup
  b: hard_ramp
  c: hard_replay
type_routing:
  supported: true
  default_mode: "off"
  metadata_path: ../llm-taxonomy/artifacts/rationales_ssg_text_v4_0_train_normalized.csv
  enabled_sampler_mode: legacy_weighted
exposure:
  persistent: true
  max_repeat_per_near_duplicate_group: 8
  # Match the per-epoch repeat cap. The former value 2 produced a total cap of
  # 24, leaving only ~2.6% capacity above the 12-epoch hard-replay demand.
  max_cumulative_exposure_per_scenario_per_epoch: 4
  max_cumulative_exposure_per_near_duplicate_group_per_epoch: 8
