protocol_id: flat_area_matched_v1

runtime:
  # Shared feature cache identity for every method and seed using this protocol.
  # Bump only when the base PLUTO feature-builder/serialization contract changes.
  feature_cache_name: flat_lr_comparison_v1_pluto_feature_v1

# One optimizer/scheduler trajectory is resumed across cumulative 2/6/12
# Lightning boundaries. The LR-step integral matches the former 804-step
# warmup-100 cosine schedule (LoRA peak 5e-5, terminal 1e-6).
schedule:
  type: warmup_constant
  horizon_epochs: 12
  warmup_steps: 32
  lora_lr: 2.593849080532655e-5
  head_lr: 5.18769816106531e-6
  reference:
    type: warmup_cosine
    total_steps: 804
    warmup_steps: 100
    lora_peak_lr: 5.0e-5
    lora_min_lr: 1.0e-6
    lr_step_integral: 0.0204525

optimizer:
  # Staged curriculum methods reset Adam tensor moments at A -> B while
  # preserving scheduler and Lightning loop state. Uniform FT has no phase
  # transition and the canonical runner therefore ignores this reset boundary.
  reset_boundaries:
    - phase_a_to_b
  weight_decay: 0.05

phases:
  cumulative_epochs:
    a: 2
    b: 6
    c: 12
  bucket_target_proportions:
    # Phase A: short easy warm-up before the hard-focused ramp.
    a: [0.70, 0.20, 0.10]
    # Phase B is overridden per epoch by phases.pacing.phase_alpha.b.
    # This static value is the final alpha=0.8 target and acts as fallback.
    b: [0.133333333334, 0.133333333334, 0.733333333332]
    # Phase C keeps 20% uniform replay and 80% hard-prior mass:
    # q=(1-alpha)U+alpha H, alpha=0.8, U=[1/3,1/3,1/3], H=[0,0,1].
    c: [0.066666666667, 0.066666666667, 0.866666666666]
  pacing:
    phase_alpha:
      b:
        type: hard_replay_ramp
        alpha_start: 0.0
        alpha_end: 0.8
        ramp_epochs: 4
        uniform_prior: [0.333333333333, 0.333333333333, 0.333333333334]
        hard_prior: [0.0, 0.0, 1.0]

lora:
  enabled: true
  rank: 4
  alpha: 8.0
  dropout: 0.05
  ultra_minimal: true

training:
  base_lr: 1.0e-5
  batch_size: 4
  accumulate_grad_batches: 8
  gradient_clip_val: 0.5
  skip_nan_steps: true
  remove_invalid_goals: false
  num_sanity_val_steps: 0

checkpoint:
  require_protocol_match_on_resume: true
