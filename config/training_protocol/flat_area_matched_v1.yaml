protocol_id: flat_area_matched_v1

runtime:
  # Shared feature cache identity for every method and seed using this protocol.
  # Bump only when the base PLUTO feature-builder/serialization contract changes.
  feature_cache_name: flat_lr_comparison_v1_pluto_feature_v1

# One optimizer/scheduler trajectory is resumed across cumulative 2/10/12
# Lightning boundaries. All methods use the same optimizer-step-indexed LR
# trajectory so curriculum sample order is compared under an identical LR.
schedule:
  type: warmup_cosine
  horizon_epochs: 12
  total_steps: 804
  warmup_steps: 100
  lora_lr: 5.0e-5
  head_lr: 1.0e-5
  min_lr: 1.0e-6

optimizer:
  # Keep one AdamW state and one scheduler trajectory across staged phase
  # boundaries. An empty list is deliberate: curriculum methods differ only in
  # sample ordering/pacing, not optimizer resets.
  reset_boundaries:
  weight_decay: 0.05

phases:
  cumulative_epochs:
    a: 2
    b: 10
    c: 12
  bucket_target_proportions:
    # Phase A: short easy warm-up before the hard-focused ramp.
    a: [0.333333333333, 0.333333333333, 0.333333333334]
    # Phase B is overridden per epoch by phases.pacing.phase_alpha.b.
    # This static value is the final alpha=0.8 target and acts as fallback.
    b: [0.066666666667, 0.066666666667, 0.866666666666]
    # Phase C keeps 20% uniform replay and 80% hard-prior mass:
    # q=(1-alpha)U+alpha H, alpha=0.8, U=[1/3,1/3,1/3], H=[0,0,1].
    c: [0.066666666667, 0.066666666667, 0.866666666666]
  pacing:
    phase_alpha:
      b:
        type: hard_replay_ramp
        alpha_start: 0.0
        alpha_end: 0.8
        ramp_epochs: 8
        uniform_prior: [0.333333333333, 0.333333333333, 0.333333333334]
        hard_prior: [0.0, 0.0, 1.0]

lora:
  enabled: true
  rank: 4
  alpha: 8.0
  dropout: 0.05
  ultra_minimal: true

training:
  base_lr: 1.0e-5
  batch_size: 4
  accumulate_grad_batches: 8
  gradient_clip_val: 0.5
  skip_nan_steps: true
  remove_invalid_goals: false
  num_sanity_val_steps: 0

checkpoint:
  require_protocol_match_on_resume: true
